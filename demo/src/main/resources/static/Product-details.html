<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f8fafc;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);

display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.image{
height:400px;
background:#e2e8f0;
border-radius:20px;

display:flex;
justify-content:center;
align-items:center;
font-size:120px;
}

.title{
font-size:35px;
margin-bottom:10px;
color:#1e293b;
}

.price{
font-size:28px;
color:#2563eb;
font-weight:bold;
margin-bottom:20px;
}

.info{
color:#64748b;
line-height:1.8;
margin-bottom:25px;
}

.seller{
background:#f1f5f9;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

.rent{
background:#2563eb;
color:white;
}

.contact{
background:#10b981;
color:white;
}

</style>
</head>
<body>

<div class="container">
    <div class="image">
        <img
            id="productImage"
            style="
                width:100%;
                height:100%;
                object-fit:cover;
                border-radius:20px;
            ">
    </div>

<div>

    <h1 class="title" id="title"></h1>
    
    <div class="price" id="price"></div>
    
    <div class="seller">

        <h3>Seller Information</h3>
    
        <p>
            👤 <strong>Name:</strong>
            <span id="sellerName"></span>
        </p>
    
        <p>
            📧 <strong>Email:</strong>
            <span id="sellerEmail"></span>
        </p>
        <p>
            🎓 <strong>University:</strong>
            <span id="sellerUniversity"></span>
        </p>
    
    </div>
    
    <div class="info">
    
        <p>
            Category:
            <span id="category"></span>
        </p>
    
        <p>
            Type:
            <span id="type"></span>
        </p>
        <p>
            Status:
            <span id="status"></span>
        </p>
    
        <br>
    
        <p id="description"></p>
    
    </div>
    
    <button class="btn rent" id="rentBtn">
       Request to Rent
    </button>
    
    <button id="returnBtn" class="btn" style="display:none;">
        Return Product
    </button>
    <button class="btn contact" id="contactBtn">
        Contact Seller
    </button>
    
    </div>





</div>
<script src="js/common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="js/toast.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/product-details.js"></script>

</body>
</html>
