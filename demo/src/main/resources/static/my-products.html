<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<title>My Products</title>

<style>

body{
    font-family:Segoe UI;
    background:#f5f7fb;
    margin:0;
}

h1{
    text-align:center;
    color:#2563eb;
    margin:30px 0;
}

#productsContainer{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.product-card{

    background:white;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.1);

    padding:20px;

}

.product-card img{

    width:100%;

    height:180px;

    object-fit:cover;

    border-radius:10px;

}

.price{

    color:#2563eb;

    font-weight:bold;

    font-size:20px;

}

.btn{

    width:48%;

    margin-top:15px;

    padding:12px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    color:white;

}

.edit{

    background:#2563eb;

}

.delete{

    background:#ef4444;

}

</style>

</head>

<body>

<h1>My Products</h1>

<div id="productsContainer"></div>

<script src="js/common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="js/toast.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/my-products.js"></script>

</body>
</html>
