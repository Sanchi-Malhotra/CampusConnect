<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusConnect - Choose Role</title>
<link rel="stylesheet" href="css/style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#dbeafe 0%,transparent 40%),
    radial-gradient(circle at bottom right,#ede9fe 0%,transparent 40%),
    #f8fafc;
}

.container{
    width:90%;
    max-width:1000px;
    text-align:center;
}

h1{
    font-size:48px;
    color:#1e293b;
    margin-bottom:10px;
}

.subtitle{
    color:#64748b;
    font-size:18px;
    margin-bottom:50px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:350px;
    background:white;
    padding:40px 30px;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 15px 30px rgba(0,0,0,0.08);
}

.card:hover{
    transform:translateY(-12px);
}

.rent-card{
    border-top:6px solid #2563eb;
}

.sell-card{
    border-top:6px solid #7c3aed;
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

.card h2{
    color:#1e293b;
    margin-bottom:15px;
}

.card p{
    color:#64748b;
    line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<h1>🎓 Welcome to CampusConnect</h1>

<p class="subtitle">
    What would you like to do today?
</p>

<div class="cards">

    <div class="card rent-card"
         onclick="selectRole('renter')">

        <div class="icon">🔍</div>

        <h2>I Want To Rent Items</h2>

        <p>
            Browse books, notes, calculators,
            electronics and more from students
            in your university.
        </p>

    </div>

    <div class="card sell-card"
         onclick="selectRole('seller')">

        <div class="icon">📦</div>

        <h2>I Want To List My Items</h2>

        <p>
            Upload your products, rent them out
            or sell them to other students and
            earn money.
        </p>

    </div>

</div>

</div>

<script>

function selectRole(role){

    localStorage.setItem("role", role);

    window.location.href = "dashboard.html";

}

</script>
<script src="js/common.js"></script>

</body>
</html>
