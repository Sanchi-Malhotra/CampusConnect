<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusConnect</title>
<link rel="stylesheet" href="css/style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#dbeafe 0%,transparent 40%),
    radial-gradient(circle at bottom right,#ede9fe 0%,transparent 40%),
    #f8fafc;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 8%;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#2563eb;
}

.hero{
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    padding:20px;
}

.hero h1{
    font-size:65px;
    color:#1e293b;
    margin-bottom:20px;
}

.hero p{
    font-size:22px;
    max-width:700px;
    color:#64748b;
    margin-bottom:35px;
}

.start-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:16px 35px;
    border-radius:50px;
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
}

.start-btn:hover{
    transform:translateY(-4px);
}

.stats{
    display:flex;
    gap:20px;
    margin-top:50px;
    flex-wrap:wrap;
    justify-content:center;
}

.stat-card{
    background:white;
    padding:20px 35px;
    border-radius:18px;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.stat-card h2{
    color:#2563eb;
}

.floating{
    position:absolute;
    font-size:40px;
    opacity:0.15;
    animation:float 15s linear infinite;
}

.f1{left:10%;}
.f2{left:30%; animation-delay:3s;}
.f3{left:50%; animation-delay:6s;}
.f4{left:70%; animation-delay:9s;}
.f5{left:90%; animation-delay:12s;}

@keyframes float{
    0%{
        transform:translateY(100vh) rotate(0deg);
    }
    100%{
        transform:translateY(-150px) rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="floating f1">📚</div>
<div class="floating f2">💻</div>
<div class="floating f3">🧮</div>
<div class="floating f4">🏏</div>
<div class="floating f5">📝</div>

<nav>
    <div class="logo">🎓 CampusConnect</div>
</nav>

<section class="hero">

    <h1>Rent, Buy & Sell on Campus</h1>

    <p>
        Find books, notes, calculators, electronics,
        sports equipment and more from students in your university.
    </p>

    <button class="start-btn" onclick="start()">
        Get Started 🚀
    </button>

    <div class="stats">

        <div class="stat-card">
            <h2>5+</h2>
            <p>Product Categories</p>
        </div>
       <div class="stat-card">
        <h2>Rent • Sell • Exchange</h2>
        <p>Flexible Listing Options</p>
    </div>
    
        <div class="stat-card">
            <h2>JWT</h2>
            <p>Secure Authentication</p>
        </div>
        
    </div>

</section>

<script>

function start(){
    window.location.href="login.html";
}
</script>
<script src="js/common.js"></script>

</body>
</html>
