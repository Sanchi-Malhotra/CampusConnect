<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product - CampusConnect</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f8fafc;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#1e293b;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #cbd5e1;
border-radius:10px;
font-size:15px;
}

textarea{
resize:none;
height:120px;
}

button{
width:100%;
padding:15px;
border:none;
background:#2563eb;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>
<body>

    <div class="container">

        <h1>📦 Add Product</h1>
        
        <form id="productForm">
        
        <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="title" placeholder="Scientific Calculator">
        </div>
        
        <div class="form-group">
        <label>Category</label>
        
        <select id="category">
        <option value="BOOK">BOOK</option>
        <option value="NOTES">NOTES</option>
        <option value="CALCULATOR">CALCULATOR</option>
        <option value="CYCLE">CYCLE</option>
        <option value="LAPTOP">LAPTOP</option>
        <option value="HOSTEL_ITEM">HOSTEL_ITEM</option>
        </select>
        
        </div>
        
        <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" id="price" placeholder="50">
        </div>
        
        <div class="form-group">
        <label>Type</label>
        
        <select id="type">
        <option value="RENT">RENT</option>
        <option value="SELL">SELL</option>
        <option value="EXCHANGE">EXCHANGE</option>
        </select>
        
        </div>
        
        <div class="form-group">
            <label>Product Image</label>
            
            <input
            type="file"
            id="image"
            accept="image/*">
            
            </div>

        <div class="form-group">
        <label>Description</label>
        <textarea id="description"></textarea>
        </div>
        
        <button type="submit">
        Upload Product
        </button>
        
        </form>
        
        </div>


<script src="js/common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="js/toast.js"></script>
<script src="js/add-product.js"></script>

</body>
</html>
